<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

:root {
  --accent:      #0A84FF;
  --accent-soft: rgba(10,132,255,0.12);
  --danger:      #FF3B30;
  --danger-soft: rgba(255,59,48,0.10);
  --warning:     #FF9500;
  --warning-soft:rgba(255,149,0,0.10);
  --success:     #30D158;
  --success-soft:rgba(48,209,88,0.10);
  --bg:          #F0F2F8;
  --surface:     rgba(255,255,255,0.82);
  --surface-solid:#FFFFFF;
  --label:       #09090E;
  --label2:      rgba(9,9,14,0.65);
  --label3:      rgba(9,9,14,0.38);
  --sep:         rgba(9,9,14,0.08);
  --shadow-sm:   0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:   0 4px 20px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
  --radius-sm:   12px;
  --radius:      18px;
  --radius-lg:   24px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(10,132,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 110%, rgba(48,209,88,0.06) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

#wrap {
  display: flex;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

#app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: transparent;
}

.hdr {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--sep);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo { height: 52px; max-width: 160px; object-fit: contain; }

.badge {
  background: linear-gradient(135deg, rgba(255,59,48,0.15), rgba(255,59,48,0.08));
  color: var(--danger);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.02em;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid rgba(255,59,48,0.18);
  display: none;
  white-space: nowrap;
}
.badge.on { display: block; animation: badgePop .3s cubic-bezier(.34,1.56,.64,1); }

.tabs {
  display: flex;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--sep);
  padding: 0 8px;
  gap: 2px;
  position: sticky;
  top: 85px;
  z-index: 49;
}

.tab {
  flex: 1;
  padding: 12px 4px 13px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--label3);
  cursor: pointer;
  position: relative;
  transition: color .2s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.tab.active { color: var(--accent); }

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  animation: tabSlide .22s ease;
}

#content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 14px 32px;
}

.slabel {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--label3);
  padding: 6px 4px 10px;
}

.card {
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius);
  padding: 14px 14px 14px 18px;
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  gap: 13px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(255,255,255,0.6);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform .15s ease, box-shadow .15s ease, opacity .25s ease;
  animation: cardIn .28s cubic-bezier(.22,1,.36,1) both;
}

.card:active {
  transform: scale(.985);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.card::before {
  content: '';
  position: absolute;
  left: 0; top: 10%; bottom: 10%;
  width: 3.5px;
  border-radius: 0 3px 3px 0;
}

.card.red::before    { background: linear-gradient(180deg, #FF6B6B, var(--danger)); }
.card.orange::before { background: linear-gradient(180deg, #FFBD69, var(--warning)); }
.card.ok::before     { background: linear-gradient(180deg, #5EE88B, var(--success)); }

.icon {
  width: 44px; height: 44px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.card.red    .icon { background: var(--danger-soft); }
.card.orange .icon { background: var(--warning-soft); }
.card.ok     .icon { background: var(--success-soft); }

.info { flex: 1; min-width: 0; }

.cname {
  font-size: 15px;
  font-weight: 800;
  color: var(--label);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
  letter-spacing: -0.01em;
}

.cdate {
  font-size: 12.5px;
  color: var(--label3);
  line-height: 1.4;
  font-weight: 500;
}

.card.red    .cdate:first-of-type { color: var(--danger); font-weight: 700; }
.card.orange .cdate:first-of-type { color: var(--warning); font-weight: 700; }

.chev {
  font-size: 18px;
  color: rgba(9,9,14,0.18);
  flex-shrink: 0;
  font-weight: 700;
}

.detail-top {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  margin: -16px -14px 18px;
  padding: 20px 20px 18px;
  border-bottom: 1px solid var(--sep);
}

.back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--accent);
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.back::before { content: '‹'; font-size: 20px; line-height: 1; }

.detail-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--label);
  letter-spacing: -0.03em;
  line-height: 1.1;
}

.detail-sub {
  font-size: 13px;
  color: var(--label3);
  font-weight: 600;
  margin-top: 3px;
}

.main-intervention {
  background: var(--surface-solid);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(255,255,255,0.8);
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
  animation: cardIn .3s ease both;
}

.main-intervention .icon {
  width: 50px; height: 50px;
  border-radius: 15px;
  font-size: 24px;
  background: var(--accent-soft);
  flex-shrink: 0;
}

.main-title {
  font-size: 19px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  color: var(--label);
}

.main-line {
  font-size: 14px;
  color: var(--label2);
  line-height: 1.5;
  font-weight: 500;
}

.main-date {
  color: var(--warning);
  font-weight: 800;
  margin-top: 8px;
  font-size: 13.5px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 8px;
  background: var(--success-soft);
  color: var(--success);
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin-bottom: 16px;
}

.action {
  background: var(--surface-solid);
  border: none;
  border-radius: var(--radius-sm);
  min-height: 90px;
  padding: 14px 6px 12px;
  font-family: inherit;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(255,255,255,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
  -webkit-tap-highlight-color: transparent;
  animation: cardIn .3s ease both;
}

.action:active {
  transform: scale(.94);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.action-ico { font-size: 28px; line-height: 1; }

.action span {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  letter-spacing: -0.01em;
}

.action.disabled { opacity: .38; cursor: default; }
.action.disabled span { color: var(--label3); }

.bottom-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 8px;
}

.primary-btn {
  width: 100%;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 16px;
  font-weight: 800;
  padding: 17px;
  cursor: pointer;
  background: linear-gradient(160deg, #2196FF, #0A84FF);
  color: #fff;
  box-shadow: 0 4px 16px rgba(10,132,255,0.35), 0 1px 4px rgba(10,132,255,0.2);
  transition: transform .15s, box-shadow .15s;
  letter-spacing: -0.01em;
  -webkit-tap-highlight-color: transparent;
}

.primary-btn:active {
  transform: scale(.97);
  box-shadow: 0 2px 8px rgba(10,132,255,0.25);
}

.secondary-btn {
  width: 100%;
  border: 1.5px solid rgba(10,132,255,0.2);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  padding: 17px;
  cursor: pointer;
  background: rgba(10,132,255,0.05);
  color: var(--accent);
  transition: transform .15s;
  -webkit-tap-highlight-color: transparent;
}

.secondary-btn:active { transform: scale(.97); }

.danger-btn {
  width: 100%;
  border: 1.5px solid rgba(255,59,48,0.18);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  padding: 17px;
  cursor: pointer;
  background: rgba(255,59,48,0.05);
  color: var(--danger);
  transition: transform .15s;
  -webkit-tap-highlight-color: transparent;
}

.danger-btn:active { transform: scale(.97); }

.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 80px 32px;
  animation: cardIn .35s ease;
}

.empty-ico   { font-size: 52px; }
.empty-title { font-size: 18px; font-weight: 800; color: var(--label); letter-spacing: -0.02em; }
.empty-sub   { font-size: 13px; color: var(--label3); text-align: center; line-height: 1.5; }

.loader { display: flex; justify-content: center; padding: 80px; }

.spinner {
  width: 30px; height: 30px;
  border: 3px solid rgba(10,132,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}

.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.backdrop.open {
  display: flex;
  animation: backdropIn .22s ease;
}

.sheet {
  width: 100%;
  max-width: 430px;
  padding: 0 12px 30px;
  animation: sheetUp .28s cubic-bezier(.32,.72,0,1);
}

.sheet-card {
  background: rgba(252,252,252,0.96);
  backdrop-filter: blur(30px);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}

.sheet-info {
  padding: 18px 18px 16px;
  text-align: center;
  border-bottom: 1px solid var(--sep);
}

.sheet-name { font-size: 16px; font-weight: 800; color: var(--label); letter-spacing: -0.01em; }
.sheet-sub  { font-size: 13px; color: var(--label3); margin-top: 3px; font-weight: 500; }

.sbtn {
  width: 100%;
  padding: 17px;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .12s;
  letter-spacing: -0.01em;
}

.sbtn:active { background: rgba(0,0,0,0.04); }
.sbtn + .sbtn { border-top: 1px solid var(--sep); }
.sbtn.confirm { color: var(--accent); }
.sbtn.warn    { color: var(--warning); }
.sbtn.danger  { color: var(--danger); }
.sbtn.cancel  { color: var(--label); font-weight: 700; }

.toast {
  position: fixed;
  left: 50%;
  bottom: 34px;
  transform: translateX(-50%) translateY(12px);
  background: rgba(18,18,22,0.88);
  backdrop-filter: blur(16px);
  color: #fff;
  padding: 12px 20px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s ease, transform .22s cubic-bezier(.32,.72,0,1);
  border: 1px solid rgba(255,255,255,0.1);
  letter-spacing: -0.01em;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

textarea {
  width: 100%;
  min-height: 130px;
  border: 1.5px solid var(--sep);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  resize: none;
  outline: none;
  background: var(--surface-solid);
  box-shadow: var(--shadow-sm);
  color: var(--label);
  transition: border-color .18s;
  margin-bottom: 14px;
}

textarea:focus { border-color: var(--accent); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes badgePop {
  from { transform: scale(.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes tabSlide {
  from { transform: scaleX(.5); opacity: 0; }
  to   { transform: scaleX(1); opacity: 1; }
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
@keyframes backdropIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes spin { to { transform: rotate(360deg); } }

.card:nth-child(1) { animation-delay: .03s; }
.card:nth-child(2) { animation-delay: .06s; }
.card:nth-child(3) { animation-delay: .09s; }
.card:nth-child(4) { animation-delay: .12s; }
.card:nth-child(5) { animation-delay: .15s; }

.action:nth-child(1) { animation-delay: .05s; }
.action:nth-child(2) { animation-delay: .09s; }
.action:nth-child(3) { animation-delay: .13s; }
.action:nth-child(4) { animation-delay: .17s; }
.action:nth-child(5) { animation-delay: .21s; }
.action:nth-child(6) { animation-delay: .25s; }
</style>
</head>

<body>
<div id="wrap">
  <div id="app">

    <div class="hdr" id="mainHeader">
      <img src="https://i.imgur.com/1ZFTLIo.png" class="logo" alt="Clarity Systems">
      <span class="badge" id="badge"></span>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="today">Aujourd'hui</div>
      <div class="tab" data-tab="planning">Planning</div>
      <div class="tab" data-tab="history">Historique</div>
    </div>

    <div id="content"></div>

  </div>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-card">
      <div class="sheet-info">
        <div class="sheet-name" id="sname"></div>
        <div class="sheet-sub"  id="ssub"></div>
      </div>
      <div id="sheetButtons"></div>
      <button type="button" class="sbtn cancel" onclick="closeSheet()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GET_URL  = "https://hook.eu1.make.com/wfp9dc520ic15yvl7u4lx6v1oyuhlckn";
const POST_URL = "https://hook.eu1.make.com/v2at1keat2dqxxf2jza4tnxp3m3a2g35";
const HIST_URL = "https://hook.eu1.make.com/6etkl3pphxxwmly0jha93m246am0d2n8";

let items = [], hist = [], currentTab = "today";
let selectedItem = null, pendingId = null;
let reportLinesById = {}, reportClosedById = {}, tempLine = {}, reportStep = 1;

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    currentTab = t.dataset.tab;
    selectedItem = null;
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    showMainBars();
    render();
  });
});

async function loadData() {
  showLoader();
  try { items = await (await fetch(GET_URL)).json(); } catch { items = []; }
  try { hist  = await (await fetch(HIST_URL)).json(); } catch { hist = []; }
  updateBadge();
  render();
}

function render() {
  const c = document.getElementById("content");
  c.innerHTML = "";
  if (selectedItem && currentTab !== "history") { renderDetail(selectedItem); return; }
  showMainBars();
  const today = midnight(new Date());

  if (currentTab === "today") {
    const all = items.filter(i => midnight(i.date) <= today);
    if (!all.length) { c.innerHTML = empty("✅","Aucune intervention aujourd'hui","Le planning est à jour."); return; }
    const late   = all.filter(i => midnight(i.date) < today);
    const todayL = all.filter(i => midnight(i.date).getTime() === today.getTime());
    if (late.length)   { c.innerHTML += `<div class="slabel">En retard</div>`; late.forEach((item,i) => c.innerHTML += listCard(item,i,"red")); }
    if (todayL.length) { c.innerHTML += `<div class="slabel">Aujourd'hui</div>`; todayL.forEach((item,i) => c.innerHTML += listCard(item,i,"orange")); }

  } else if (currentTab === "planning") {
    const sorted = [...items].sort((a,b) => new Date(a.date)-new Date(b.date));
    if (!sorted.length) { c.innerHTML = empty("📅","Planning vide","Aucune intervention planifiée."); return; }
    c.innerHTML += `<div class="slabel">Planning complet</div>`;
    sorted.forEach((item,i) => {
      const d = midnight(item.date);
      const cls = d < today ? "red" : d.getTime() === today.getTime() ? "orange" : "ok";
      c.innerHTML += listCard(item,i,cls);
    });

  } else {
    const sorted = [...hist].sort((a,b) => new Date(b.date)-new Date(a.date));
    if (!sorted.length) { c.innerHTML = empty("🗂️","Aucun historique","Les interventions terminées apparaîtront ici."); return; }
    c.innerHTML += `<div class="slabel">Terminées</div>`;
    sorted.forEach((item,i) => {
      c.innerHTML += `
        <div class="card ok" onclick="openHistoryDetailByIndex(${i})">
          <div class="icon">✅</div>
          <div class="info">
            <div class="cname">${safe([item.entreprise,item.name].filter(Boolean).join(" · "))}</div>
            <div class="cdate">${fmtDate(item.date)} · ${fmtHeure(item.date)}</div>
            <div class="cdate">${safe(getAdresseSansCP(item.adresse))}</div>
            <div class="cdate">${safe(getCodePostalVille(item.adresse))}</div>
          </div>
          <div class="chev">›</div>
        </div>`;
    });
  }
}

function listCard(item, idx, cls) {
  const ico = cls === "red" ? "⚠️" : cls === "orange" ? "📅" : "📋";
  return `
    <div class="card ${cls}" onclick="openDetail('${escapeJs(item.id)}')">
      <div class="icon">${ico}</div>
      <div class="info">
        <div class="cname">${safe(item.entreprise||"")} · ${safe(item.name||"")}</div>
        <div class="cdate">${fmtDate(item.date)} · ${fmtHeure(item.date)}</div>
        <div class="cdate">${safe(getAdresseSansCP(item.adresse))}</div>
        <div class="cdate">${safe(getCodePostalVille(item.adresse))}</div>
      </div>
      <div class="chev">›</div>
    </div>`;
}

function openDetail(id) {
  selectedItem = items.find(i => String(i.id) === String(id));
  if (selectedItem) renderDetail(selectedItem);
}

function openHistoryDetailByIndex(index) {
  const sorted = [...hist].sort((a,b) => new Date(b.date)-new Date(a.date));
  selectedItem = sorted[index];
  if (selectedItem) renderHistoryDetail(selectedItem);
  else toast("Impossible d'ouvrir cet historique");
}

function renderDetail(item) {
  hideMainBars();
  const c = document.getElementById("content");
  const today = midnight(new Date());
  const d = midnight(item.date);
  const isPlanning = currentTab === "planning";
  const isFuture = d > today;
  const showWorkActions = !isPlanning && !isFuture;
  const phone = item.telephone || item.tel || item.phone || "";
  const hasPhone = String(phone).trim().length > 0;
  const lines = reportLinesById[item.id] || [];
  const reportDone = reportClosedById[item.id] === true;

  const reportStatus = showWorkActions
    ? `<div class="${reportDone ? 'status-pill' : 'main-line'}" style="${reportDone ? '' : 'margin-top:8px'}">
        ${reportDone ? "✅ Rapport clôturé" : lines.length ? "📝 Rapport en cours" : "📄 Rapport non rempli"}
       </div>`
    : "";

  const closeButton = showWorkActions
    ? `<button class="primary-btn" onclick="tryCloseIntervention('${escapeJs(item.id)}')">Clôturer l'intervention</button>`
    : "";

  const workButtons = showWorkActions
    ? `<button class="action" onclick="openReportPage()"><div class="action-ico">📋</div><span>Rapport</span></button>
       <button class="action" onclick="toast('Facture bientôt disponible')"><div class="action-ico">💶</div><span>Facture</span></button>`
    : "";

  c.innerHTML = `
    <div class="detail-top">
      <div class="back" onclick="backToList()">Retour</div>
      <div class="detail-title">Intervention</div>
      <div class="detail-sub">${isPlanning ? "Planning" : "Fiche du jour"}</div>
    </div>

    <div class="main-intervention">
      <div class="icon">📅</div>
      <div class="info">
        <div class="main-title">${safe(item.entreprise || item.name || "Client")}</div>
        <div class="main-line">${safe(item.name || "")}</div>
        <div class="main-line">${safe(getAdresseSansCP(item.adresse))}</div>
        <div class="main-line">${safe(getCodePostalVille(item.adresse))}</div>
        <div class="main-line main-date">${fmtDate(item.date)} · ${fmtHeure(item.date)}</div>
        ${reportStatus}
      </div>
    </div>

    <div class="action-grid">
      <button class="action ${hasPhone ? "" : "disabled"}" onclick="${hasPhone ? `callClient('${escapeJs(phone)}')` : `toast('Téléphone non renseigné')`}">
        <div class="action-ico">📞</div><span>Appeler</span>
      </button>
      <button class="action" onclick="openMaps('${escapeJs(item.adresse||"")}')">
        <div class="action-ico">🧭</div><span>Itinéraire</span>
      </button>
      <button class="action" onclick="toast('Infos client bientôt disponibles')">
        <div class="action-ico">👤</div><span>Infos client</span>
      </button>
      <button class="action" onclick="toast('Documents bientôt disponibles')">
        <div class="action-ico">📄</div><span>Documents</span>
      </button>
      ${workButtons}
    </div>

    <div class="bottom-actions">
      ${closeButton}
      <button class="secondary-btn" onclick="openRescheduleSheet('${escapeJs(item.id)}','${escapeJs(item.name||item.entreprise||"Client")}')">Reporter</button>
      <button class="danger-btn" onclick="openCancelSheet('${escapeJs(item.id)}','${escapeJs(item.name||item.entreprise||"Client")}')">Annuler</button>
    </div>`;
}

function renderHistoryDetail(item) {
  hideMainBars();
  const phone = item.telephone || item.tel || item.phone || "";
  const hasPhone = String(phone).trim().length > 0;
  const rapportUrl = item.rapport_pdf_url || item.rapport_url || "";
  const factureUrl = item.facture_pdf_url || item.facture_url || "";

  document.getElementById("content").innerHTML = `
    <div class="detail-top">
      <div class="back" onclick="backToList()">Retour</div>
      <div class="detail-title">Historique</div>
      <div class="detail-sub">Intervention terminée</div>
    </div>

    <div class="main-intervention">
      <div class="icon">✅</div>
      <div class="info">
        <div class="main-title">${safe(item.entreprise || item.name || "Client")}</div>
        <div class="main-line">${safe(item.name || "")}</div>
        <div class="main-line">${safe(getAdresseSansCP(item.adresse))}</div>
        <div class="main-line">${safe(getCodePostalVille(item.adresse))}</div>
        <div class="main-line main-date">${fmtDate(item.date)} · ${fmtHeure(item.date)}</div>
        <div class="status-pill">✅ Intervention clôturée</div>
      </div>
    </div>

    <div class="action-grid">
      <button class="action ${hasPhone ? "" : "disabled"}" onclick="${hasPhone ? `callClient('${escapeJs(phone)}')` : `toast('Téléphone non renseigné')`}">
        <div class="action-ico">📞</div><span>Appeler</span>
      </button>
      <button class="action" onclick="openMaps('${escapeJs(item.adresse||"")}')">
        <div class="action-ico">🧭</div><span>Itinéraire</span>
      </button>
      <button class="action" onclick="${rapportUrl ? `window.open('${escapeJs(rapportUrl)}','_blank')` : `toast('Rapport non disponible')`}">
        <div class="action-ico">📋</div><span>Voir rapport</span>
      </button>
      <button class="action" onclick="${factureUrl ? `window.open('${escapeJs(factureUrl)}','_blank')` : `toast('Facture non disponible')`}">
        <div class="action-ico">💶</div><span>Voir facture</span>
      </button>
      <button class="action" onclick="toast('Renvoi bientôt connecté à Make')">
        <div class="action-ico">📤</div><span>Renvoyer</span>
      </button>
      <button class="action" onclick="openRescheduleSheet('${escapeJs(item.id)}','${escapeJs(item.name||item.entreprise||"Client")}')">
        <div class="action-ico">📅</div><span>Reprogrammer</span>
      </button>
    </div>`;
}

function backToList() {
  selectedItem = null;
  showMainBars();
  render();
}

function openReportPage() {
  if (!selectedItem) return;
  hideMainBars();
  const id = selectedItem.id;
  const lines = reportLinesById[id] || [];
  const reportDone = reportClosedById[id] === true;

  document.getElementById("content").innerHTML = `
    <div class="detail-top">
      <div class="back" onclick="renderDetail(selectedItem)">Retour</div>
      <div class="detail-title">Rapport</div>
      <div class="detail-sub">${safe(selectedItem.entreprise || selectedItem.name || "Client")}</div>
    </div>
    <div class="slabel">Tâches ajoutées</div>
    ${lines.length ? lines.map((l,i) => `
      <div class="card ok">
        <div class="icon">📋</div>
        <div class="info">
          <div class="cname">${safe(l.equipement)} · ${safe(l.action)}</div>
          <div class="cdate">${safe(l.resultat)}</div>
          ${l.commentaire ? `<div class="cdate">${safe(l.commentaire)}</div>` : ""}
        </div>
        ${!reportDone ? `<div class="chev" onclick="removeReportLine(${i}); event.stopPropagation();" style="color:var(--danger);font-size:22px;">×</div>` : ""}
      </div>
    `).join("") : empty("📋","Aucune tâche","Ajoutez une première ligne au rapport.")}
    ${!reportDone ? `
      <button class="secondary-btn" style="margin-bottom:16px" onclick="startReportLine()">+ Ajouter une tâche</button>
      <div class="bottom-actions">
        <button class="primary-btn" onclick="closeReport()">Clôturer le rapport</button>
      </div>
    ` : `
      <div class="bottom-actions">
        <button class="primary-btn" onclick="renderDetail(selectedItem)">Retour à l'intervention</button>
      </div>
    `}`;
}

function startReportLine() { tempLine = {}; reportStep = 1; renderReportStep(); }

function renderReportStep() {
  if (reportStep === 1) renderChoiceStep("Équipement", ["Extincteur","BAES","Alarme incendie","RIA","Désenfumage","Porte coupe-feu","Détecteur","Signalétique","Autre"], "equipement");
  if (reportStep === 2) renderChoiceStep("Action réalisée", ["Vérification","Pose","Remplacement","Maintenance","Recharge","Dépose","Mise en service","Réparation","Contrôle visuel"], "action");
  if (reportStep === 3) renderChoiceStep("Résultat", ["Conforme","Non conforme","À remplacer","À réparer","Accès impossible","Client absent","Non testé","À revoir"], "resultat");
  if (reportStep === 4) {
    document.getElementById("content").innerHTML = `
      <div class="detail-top">
        <div class="back" onclick="reportStep=3;renderReportStep()">Retour</div>
        <div class="detail-title">Commentaire</div>
        <div class="detail-sub">Optionnel</div>
      </div>
      <textarea id="comment" placeholder="Exemple : RAS, accès impossible, remplacement conseillé…"></textarea>
      <div class="bottom-actions">
        <button class="primary-btn" onclick="saveReportLine()">Ajouter au rapport</button>
      </div>`;
  }
}

function renderChoiceStep(title, options, key) {
  document.getElementById("content").innerHTML = `
    <div class="detail-top">
      <div class="back" onclick="backReportStep()">Retour</div>
      <div class="detail-title">${title}</div>
    </div>
    <div class="action-grid">
      ${options.map(o => `
        <button class="action" onclick="selectReportValue('${key}','${escapeJs(o)}')">
          <span style="font-size:13px;color:var(--label);font-weight:700">${safe(o)}</span>
        </button>
      `).join("")}
    </div>`;
}

function selectReportValue(key, value) { tempLine[key] = value; reportStep++; renderReportStep(); }

function backReportStep() {
  if (reportStep <= 1) { openReportPage(); return; }
  reportStep--;
  renderReportStep();
}

function saveReportLine() {
  const id = selectedItem.id;
  if (!reportLinesById[id]) reportLinesById[id] = [];
  tempLine.commentaire = document.getElementById("comment").value || "";
  reportLinesById[id].push({...tempLine});
  toast("✅ Tâche ajoutée");
  openReportPage();
}

function removeReportLine(index) {
  const id = selectedItem.id;
  if (!reportLinesById[id]) return;
  reportLinesById[id].splice(index, 1);
  openReportPage();
}

function closeReport() {
  const id = selectedItem.id;
  if (!(reportLinesById[id] || []).length) { toast("Ajoutez au moins une tâche"); return; }
  reportClosedById[id] = true;
  toast("✅ Rapport clôturé");
  renderDetail(selectedItem);
}

function tryCloseIntervention(id) {
  if (!reportClosedById[id]) { toast("Veuillez clôturer le rapport avant"); return; }
  openCloseSheet(id, selectedItem.name || selectedItem.entreprise || "Client");
}

function openCloseSheet(id, name) {
  pendingId = id;
  openSheet(name, "Clôturer cette intervention ?",
    `<button class="sbtn confirm" onclick="confirmClose()">✓ Clôturer l'intervention</button>`);
}

async function confirmClose() {
  try {
    await fetch(POST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: pendingId, rapport: reportLinesById[pendingId] || [] })
    });
  } catch {}
  closeSheet();
  toast("✅ Intervention clôturée");
  selectedItem = null;
  setTimeout(() => { showMainBars(); loadData(); }, 420);
}

function openRescheduleSheet(id, name) {
  pendingId = id;
  openSheet(name, "Envoyer un lien de reprogrammation au client ?",
    `<button class="sbtn confirm" onclick="fakeAction('reporter')">Envoyer le lien de RDV</button>`);
}

function openCancelSheet(id, name) {
  pendingId = id;
  openSheet(name, "Que voulez-vous faire ?",
    `<button class="sbtn warn" onclick="fakeAction('annuler_reprogrammer')">Annuler et reprogrammer</button>
     <button class="sbtn danger" onclick="fakeAction('annuler_definitif')">Annuler définitivement</button>`);
}

function fakeAction(action) {
  closeSheet();
  if (action === "reporter") toast("Lien de RDV bientôt connecté à Make");
  if (action === "annuler_reprogrammer") toast("Annulation + reprogrammation bientôt connectées");
  if (action === "annuler_definitif") toast("Annulation définitive bientôt connectée");
}

function openSheet(name, sub, buttonsHtml) {
  document.getElementById("sname").textContent = name;
  document.getElementById("ssub").textContent = sub;
  document.getElementById("sheetButtons").innerHTML = buttonsHtml;
  document.getElementById("backdrop").classList.add("open");
}

function closeSheet() {
  document.getElementById("backdrop").classList.remove("open");
  document.getElementById("sheetButtons").innerHTML = "";
}

function showMainBars() {
  document.getElementById("mainHeader").style.display = "flex";
  document.getElementById("tabs").style.display = "flex";
}
function hideMainBars() {
  document.getElementById("mainHeader").style.display = "none";
  document.getElementById("tabs").style.display = "none";
}
function showLoader() {
  document.getElementById("content").innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
}
function empty(ico, title, sub = "") {
  return `<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}

let tt;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(tt);
  tt = setTimeout(() => el.classList.remove("show"), 2300);
}

function callClient(phone) { window.location.href = "tel:" + phone; }
function openMaps(adresse) {
  window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(adresse), "_blank");
}

function updateBadge() {
  const today = midnight(new Date());
  const n = items.filter(i => midnight(i.date) < today).length;
  const b = document.getElementById("badge");
  b.textContent = n + " en retard";
  b.classList.toggle("on", n > 0);
}
function midnight(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function fmtDate(str) {
  const d = new Date(str);
  const s = d.toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtHeure(str) {
  return new Date(str).toLocaleTimeString("fr-FR", { hour:"2-digit", minute:"2-digit" });
}
function getAdresseSansCP(adresse) {
  return String(adresse||"").replace(/\s+\d{5}\s+.+$/i, "");
}
function getCodePostalVille(adresse) {
  const m = String(adresse||"").match(/(\d{5})\s+(.+)$/);
  return m ? `${m[1]} ${m[2]}` : "";
}
function escapeJs(v) {
  return String(v||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");
}
function safe(v) {
  return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

loadData();
</script>
</body>
</html>
